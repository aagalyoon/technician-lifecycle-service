version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: techlifecycle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-servicetitan:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "3001:3001"
    environment:
      MOCK_ST_PORT: 3001

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: techlifecycle
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      SERVICETITAN_API_URL: http://mock-servicetitan:3001
      SERVICETITAN_CLIENT_ID: mock-client-id
      SERVICETITAN_CLIENT_SECRET: mock-client-secret
      SYNC_INTERVAL_MINUTES: 15
      PORT: 3000
      NODE_ENV: development
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
      mock-servicetitan:
        condition: service_started
    command: >
      sh -c "
        node dist/src/migrate.js &&
        node dist/src/seed.js &&
        node dist/src/index.js
      "

volumes:
  pgdata:
